<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>มีอะไรจะให้ดูแหละ</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #ffe4e1, #ffb6c1);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #d147a3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        /* โค้ดสร้างดอกไม้ */
        .flower {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        .mid {
            width: 50px;
            height: 50px;
            background: #fff340;
            border-radius: 50%;
            z-index: 2;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 243, 64, 0.5);
        }

        .petal {
            position: absolute;
            background: #ff69b4;
            border-radius: 50% 50% 0 0;
            width: 45px;
            height: 70px;
            top: -45px;
            left: 2.5px;
            transform-origin: bottom center;
        }

        /* จัดกลีบดอกไม้รอบๆ */
        .p1 { transform: rotate(0deg); }
        .p2 { transform: rotate(60deg); }
        .p3 { transform: rotate(120deg); }
        .p4 { transform: rotate(180deg); }
        .p5 { transform: rotate(240deg); }
        .p6 { transform: rotate(300deg); }

        .stem {
            width: 8px;
            height: 150px;
            background: #4caf50;
            margin-top: -10px;
            border-radius: 0 0 4px 4px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }

        /* หัวใจโปรยลงมา */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: fall linear infinite;
            z-index: 1;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>ดอกไม้นี้ให้เธอนะ! 🌸</h1>

    <div class="flower">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
        <div class="petal p6"></div>
        <div class="mid"></div>
    </div>
    <div class="stem"></div>

    <script>
        // ฟังก์ชันทำหัวใจตกลงมาเพิ่มความน่ารัก
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
