<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ดอกไม้สวยๆ ให้คนสวยๆ 🌻</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(180deg,#bfe3f5 0%,#dff1f9 45%,#eef8ec 65%,#eef8ec 72%);
  background-color:#eef8ec;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
  position:relative;
}
.sky-deco{
  position:absolute;top:0;left:0;width:100%;height:200px;
  pointer-events:none;
}
.sun{
  position:absolute;top:22px;right:8%;
  width:50px;height:50px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffe69a,#ffce5c);
  box-shadow:0 0 32px 12px rgba(255,206,92,.45);
}
.cloud{position:absolute;color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.03);opacity:.9}
.c1{top:20px;left:8%;font-size:1.8rem}
.c2{top:46px;left:30%;font-size:1.2rem;opacity:.75}

.title{
  font-size:1.35rem;font-weight:700;
  color:#5d7a35;
  margin-bottom:.4rem;
  opacity:0;animation:fadeIn .8s .2s forwards;
  z-index:5;
  letter-spacing:.01em;
}
@keyframes fadeIn{to{opacity:1}}

.ground{
  position:absolute;bottom:0;left:0;width:100%;height:90px;
  background:linear-gradient(180deg,#9c6b3e 0%,#7d5530 100%);
  border-top:6px solid #6cb050;
  z-index:1;
}
.grass-tuft{
  position:absolute;bottom:84px;width:10px;height:14px;
  background:#6cb050;border-radius:6px 6px 0 0;
}

.scene{
  position:relative;width:280px;height:330px;
  cursor:pointer;
  z-index:2;
}

.dirt-mound{
  position:absolute;bottom:78px;left:50%;
  transform:translateX(-50%);
  width:64px;height:22px;
  background:radial-gradient(ellipse at center,#8a5e36,#74492a 80%);
  border-radius:50%;
  z-index:3;
  transition:opacity .35s, transform .35s;
}
.scene.planted .dirt-mound{
  opacity:0;
  transform:translateX(-50%) scale(.7);
}

.seed{
  position:absolute;bottom:86px;left:50%;
  transform:translateX(-50%);
  width:9px;height:13px;
  background:linear-gradient(160deg,#6b4226,#3f2614);
  border-radius:50% 50% 50% 50% / 65% 65% 35% 35%;
  z-index:4;
  transition:opacity .3s, transform .3s;
}
.scene.planted .seed{
  opacity:0;
  transform:translateX(-50%) translateY(8px) scale(.4);
}

.hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:.85rem;color:#6b4a28;
  background:#fffaf0;border:1px solid #e8d0a0;
  padding:7px 18px;border-radius:50px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  transition:opacity .4s, transform .4s;
  z-index:6;white-space:nowrap;
}
.hint.gone{opacity:0;pointer-events:none;transform:translateY(4px)}

.sparkle{
  position:absolute;bottom:96px;left:50%;
  transform:translateX(-50%);
  font-size:1.3rem;
  opacity:0;
  z-index:5;
  pointer-events:none;
}
.scene.planted .sparkle{ animation:twinkle 1s ease forwards; }
@keyframes twinkle{
  0%{opacity:0;transform:translateX(-50%) scale(.3)}
  45%{opacity:1;transform:translateX(-50%) scale(1.25)}
  100%{opacity:0;transform:translateX(-50%) scale(.6) translateY(-12px)}
}

/* stem */
.stem{
  position:absolute;bottom:78px;left:50%;
  width:6px;height:0;
  background:linear-gradient(180deg,#7cbf57,#5a9c43);
  border-radius:3px;
  z-index:2;
  transform:translateX(-50%);
  transition:height 3.4s cubic-bezier(.3,.05,.25,1) .8s;
  box-shadow:1px 0 0 rgba(0,0,0,.05) inset;
}
.scene.planted .stem{ height:185px; }

/* leaves attached relative to stem's growing tip, simulated via timed delays */
.leaf{
  position:absolute;left:50%;
  width:0;height:22px;
  opacity:0;
}
.leaf .blade{
  position:absolute;top:0;width:46px;height:24px;
  background:linear-gradient(135deg,#82c25e,#5fa844);
  border-radius:0 60% 0 60%;
}
.leaf.left .blade{right:0;transform:rotate(20deg) scaleX(-1);border-radius:60% 0 60% 0}
.leaf.right .blade{left:0;transform:rotate(-20deg)}
.l1{bottom:118px;transition:opacity .5s .55s, transform .5s .55s;transform:translateX(-50%) scale(.3)}
.l2{bottom:158px;transition:opacity .5s 1.6s, transform .5s 1.6s;transform:translateX(-50%) scale(.3)}
.l3{bottom:198px;transition:opacity .5s 2.65s, transform .5s 2.65s;transform:translateX(-50%) scale(.3)}
.scene.planted .leaf{
  opacity:1;
  transform:translateX(-50%) scale(1);
}

/* sepals / bud calyx sitting at top of stem */
.flower-anchor{
  position:absolute;bottom:255px;left:50%;
  transform:translateX(-50%) scale(0);
  z-index:5;
  transition:transform .8s cubic-bezier(.34,1.45,.5,1) 3.55s;
}
.scene.planted .flower-anchor{
  transform:translateX(-50%) scale(1);
}

.flower{
  position:relative;width:118px;height:118px;
  animation:none;
}
.scene.planted .flower{
  animation:sway 3.6s ease-in-out infinite 4.5s;
  transform-origin:50% 100%;
}
@keyframes sway{
  0%,100%{transform:rotate(-3deg)}
  50%{transform:rotate(3deg)}
}

.petal-ring{position:absolute;inset:0}
.petal{
  position:absolute;left:50%;top:50%;
  width:26px;height:48px;
  background:linear-gradient(180deg,#ffd54a,#f5b300);
  border-radius:50% 50% 6% 6%;
  margin-left:-13px;margin-top:-48px;
  transform-origin:bottom center;
  box-shadow:inset 0 -6px 8px rgba(190,120,0,.35);
}
.petal.back{ filter:brightness(.94); }
.center{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  width:46px;height:46px;
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.12), transparent 40%),
    repeating-radial-gradient(circle, #6b4322 0 3px, #54341b 3px 6px);
  border-radius:50%;
  box-shadow:0 2px 4px rgba(0,0,0,.25) inset, 0 1px 0 rgba(0,0,0,.1);
  z-index:5;
}
.center::after{
  content:'';
  position:absolute;inset:0;border-radius:50%;
  box-shadow:0 0 0 3px #d99a2b inset;
}

.msg{
  margin-top:1rem;
  font-size:1.2rem;color:#7a5a18;font-weight:700;
  opacity:0;
  transition:opacity .8s;
  z-index:5;
  text-align:center;
  text-shadow:0 1px 0 rgba(255,255,255,.5);
}
.msg.show{opacity:1}

.petal-rain{
  position:fixed;pointer-events:none;z-index:50;
  font-size:16px;
  animation:fall linear forwards;
}
@keyframes fall{
  0%{transform:translateY(-4vh) rotate(0deg);opacity:.9}
  100%{transform:translateY(104vh) rotate(360deg);opacity:0}
}
</style>
</head>
<body>

<div class="sky-deco">
  <div class="sun"></div>
  <div class="cloud c1">☁️</div>
  <div class="cloud c2">☁️</div>
</div>

<div class="title">🌱</div>

<div class="scene" id="scene">
  <div class="dirt-mound"></div>
  <div class="seed"></div>
  <div class="sparkle">✨</div>

  <div class="stem" id="stem"></div>

  <div class="leaf left l1"><div class="blade"></div></div>
  <div class="leaf right l1"><div class="blade"></div></div>
  <div class="leaf left l2"><div class="blade"></div></div>
  <div class="leaf right l2"><div class="blade"></div></div>
  <div class="leaf left l3"><div class="blade"></div></div>
  <div class="leaf right l3"><div class="blade"></div></div>

  <div class="flower-anchor">
    <div class="flower">
      <div class="petal-ring">
        <div class="petal back" style="transform:rotate(15deg) translateY(-32px)"></div>
        <div class="petal back" style="transform:rotate(75deg) translateY(-32px)"></div>
        <div class="petal back" style="transform:rotate(135deg) translateY(-32px)"></div>
        <div class="petal back" style="transform:rotate(195deg) translateY(-32px)"></div>
        <div class="petal back" style="transform:rotate(255deg) translateY(-32px)"></div>
        <div class="petal back" style="transform:rotate(315deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(0deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(45deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(90deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(135deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(180deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(225deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(270deg) translateY(-32px)"></div>
        <div class="petal" style="transform:rotate(315deg) translateY(-32px)"></div>
      </div>
      <div class="center"></div>
    </div>
  </div>

  <div class="hint" id="hint">แตะที่ดินเพื่อปลูกเมล็ด</div>
</div>

<div class="msg" id="msg">ดอกไม้สวยๆ ให้คนสวยๆ 🌻💛</div>

<script>
const scene=document.getElementById('scene');
const hint=document.getElementById('hint');
const msg=document.getElementById('msg');
let opened=false;
const bits=['🌻','✿','🌼','❀','💛'];

function drop(){
  const el=document.createElement('div');
  el.className='petal-rain';
  el.textContent=bits[Math.floor(Math.random()*bits.length)];
  el.style.left=Math.random()*96+'vw';
  el.style.fontSize=(Math.random()*12+10)+'px';
  const d=(Math.random()*3+3).toFixed(1);
  el.style.animationDuration=d+'s';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),d*1000+300);
}

scene.addEventListener('click',()=>{
  if(opened)return;
  opened=true;
  hint.classList.add('gone');
  scene.classList.add('planted');
  setTimeout(()=>{
    msg.classList.add('show');
    let i=setInterval(drop,180);
    setTimeout(()=>{clearInterval(i);setInterval(drop,700)},3000);
  },4500);
});
</script>
</body>
</html>
